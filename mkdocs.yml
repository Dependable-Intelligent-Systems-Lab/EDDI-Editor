site_name: EDDI Editor
site_description: Documentation for EDDI Editor, a conversion and editing bridge for ODE, HiP-HOPS, Dymodia, and DDI models.
site_url: https://dependable-intelligent-systems-lab.github.io/EDDI-Editor/
repo_url: https://github.com/Dependable-Intelligent-Systems-Lab/EDDI-Editor
repo_name: Dependable-Intelligent-Systems-Lab/EDDI-Editor
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - navigation.expand
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Overview: index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/ai-links.js

exclude_docs: |
  README.md

copyright: Copyright &copy; Dependable Intelligent Systems Lab
